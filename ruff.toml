line-length = 100
target-version = "py311"
exclude = ["*.ipynb"]

[format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"

[lint]
# Rule codes:
# E/F = pycodestyle + pyflakes
# I = isort (import sorting)
# B = bugbear (best practices)
# UP = pyupgrade (Python syntax updates)
# N = pep8-naming (naming conventions)
# C4 = comprehensions
# T20 = print statements (disallowed in libs)
# Q = flake8-quotes
# ANN201 = return type annotations
# SIM = simplify (code clarity)
# TID = tidy-imports
# ARG = unused arguments
select = [
    "E",   # pycodestyle errors
    "F",   # Pyflakes
    "I",   # isort
]

ignore = [
    "E402",   # allow path bootstrapping before imports in scripts/tests
    "E501",   # formatter handles practical line breaking
    "E203",   # whitespace before ':' (Black compatibility)
    "E266",   # too many leading '#' comments (optional)
]

# Unfixable rules: Rules that should not be auto-fixed
# (removing imports/vars or major code rewrites are too risky)
unfixable = [
    "F401",   # unused imports (may be part of public API)
    "F841",   # unused local variables (may be intentional)
    "UP",     # pyupgrade (code rewrites)
]

[lint.per-file-ignores]
"*.ipynb" = [
    "F401",   # notebook cells often keep exploratory imports for interactive runs
]
"tests/**" = [
    "F811",   # test imports can shadow intentionally
]
"scripts/**" = [
    "F401",   # helper imports are sometimes conditional
    "F841",   # benchmark warmup values may be intentionally discarded
]
"scripts/wrds_benchmark.py" = [
    "F821",   # local type annotation references runtime-only pandas import
]
"src/fast_vollib/api.py" = [
    "F401",   # re-export-oriented imports are intentional
]
"src/fast_vollib/backends/jax_backend.py" = [
    "F401",   # backend modules intentionally keep some lazy imports
]
"src/fast_vollib/backends/__init__.py" = [
    "F401",   # imported submodules are part of the backend namespace
]
"src/fast_vollib/backends/numpy_backend.py" = [
    "F401",   # helper imports may be retained for numerical variants
]
"src/fast_vollib/backends/torch_backend.py" = [
    "F401",   # backend modules intentionally keep some lazy imports
    "F821",   # torch-only annotations are runtime-local
]
"src/fast_vollib/backends/triton_kernels.py" = [
    "F401",   # numerical helper imports may be retained for kernel variants
]
"src/fast_vollib/compat/py_vollib.py" = [
    "F401",   # wrapper imports intentionally expose patched callables
]

[lint.isort]
known-first-party = ["fast_vollib"]
combine-as-imports = true
force-sort-within-sections = true
